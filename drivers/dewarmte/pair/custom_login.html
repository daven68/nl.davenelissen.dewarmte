<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>#error { color: var(--homey-color-red, #d32f2f); margin-top: 12px; }</style>
</head>

<body>

<header class="homey-header">
  <h1 id="title" class="homey-title"></h1>
  <p id="subtitle" class="homey-subtitle"></p>
</header>

<form id="login-form" class="homey-form">
  <label id="email-label" class="homey-form-label" for="email"></label>
  <input id="email" class="homey-form-input" type="email" autocomplete="username" required />

  <label id="password-label" class="homey-form-label" for="password"></label>
  <input id="password" class="homey-form-input" type="password" autocomplete="current-password" required />

  <button id="login" class="homey-button-primary" type="submit"></button>
</form>

<p id="error" role="alert" aria-live="polite"></p>

<script type="application/javascript">
  (() => {
    const form = document.getElementById('login-form');
    const loginButton = document.getElementById('login');
    const errorElement = document.getElementById('error');

    document.getElementById('title').textContent = Homey.__('pair.login.title');
    document.getElementById('subtitle').textContent = Homey.__('pair.login.subtitle');
    document.getElementById('email-label').textContent = Homey.__('pair.login.email');
    document.getElementById('password-label').textContent = Homey.__('pair.login.password');
    loginButton.textContent = Homey.__('pair.login.button');

    form.addEventListener('submit', async event => {
      event.preventDefault();
      errorElement.textContent = '';
      loginButton.disabled = true;

      try {
        await Homey.emit('login', {
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        });

        await Homey.nextView();
      } catch (error) {
        errorElement.textContent = error.message || Homey.__('pair.login.error');
      } finally {
        loginButton.disabled = false;
      }
    });
  })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script
    type="text/javascript"
    src="/homey.js"
    data-origin="settings"
  ></script>
  <style>
    :root {
      color-scheme: dark;
      --page-background: #0d1519;
      --panel-background: #172329;
      --panel-highlight: #1d2c33;
      --text-primary: #f4f8fa;
      --text-secondary: #9aabb3;
      --accent: #f28c28;
      --accent-soft: rgba(242, 140, 40, 0.18);
      --grid: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.08);
      --error: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px 16px 40px;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top right, rgba(39, 87, 99, 0.35), transparent 35%),
        var(--page-background);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(100%, 720px);
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .status {
      padding: 20px;
      color: var(--text-secondary);
      text-align: center;
      background: var(--panel-background);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .status-error {
      color: var(--error);
    }

    .heat-curve-device + .heat-curve-device {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .device-name {
      margin: 0 0 16px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chart-card,
    .setpoint-card,
    .smart-correction-card {
      background: linear-gradient(145deg, var(--panel-highlight), var(--panel-background));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
    }

    .chart-card {
      padding: 18px 14px 12px;
      overflow: hidden;
    }

    .chart-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin: 0 6px 8px;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .heat-curve-chart {
      display: block;
      width: 100%;
      height: auto;
      min-height: 250px;
    }

    .chart-grid {
      stroke: var(--grid);
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
    }

    .chart-axis-label {
      fill: var(--text-secondary);
      font-size: 12px;
    }

    .chart-line {
      fill: none;
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-width: 5;
      vector-effect: non-scaling-stroke;
    }

    .chart-area {
      fill: var(--accent-soft);
    }

    .chart-point-ring {
      fill: var(--panel-background);
      stroke: var(--accent);
      stroke-width: 4;
      vector-effect: non-scaling-stroke;
    }

    .chart-point-label {
      fill: var(--text-primary);
      font-size: 13px;
      font-weight: 700;
      paint-order: stroke;
      stroke: var(--panel-background);
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .axis-title {
      fill: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .setpoint-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .setpoint-card {
      padding: 20px;
    }

    .setpoint-title {
      margin: 0 0 18px;
      font-size: 1.1rem;
    }

    .temperature-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
    }

    .temperature-row + .temperature-row {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .temperature-label {
      color: var(--text-secondary);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .temperature-value {
      font-size: 1.55rem;
      font-variant-numeric: tabular-nums;
      font-weight: 650;
      white-space: nowrap;
    }

    .smart-correction-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 14px;
      padding: 18px 20px;
    }

    .smart-correction-title {
      margin: 0 0 4px;
      font-size: 1rem;
    }

    .smart-correction-status {
      margin: 0;
      color: var(--text-secondary);
      font-size: 0.82rem;
    }

    .readonly-toggle {
      position: relative;
      flex: 0 0 auto;
      width: 52px;
      height: 30px;
      background: #405159;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
    }

    .readonly-toggle::after {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      content: "";
      background: #dce5e8;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
      transition: transform 160ms ease;
    }

    .readonly-toggle[aria-checked="true"] {
      background: var(--accent);
    }

    .readonly-toggle[aria-checked="true"]::after {
      background: white;
      transform: translateX(22px);
    }

    @media (max-width: 560px) {
      body {
        padding-inline: 12px;
      }

      .setpoint-grid {
        grid-template-columns: 1fr;
      }

      .chart-card {
        padding-inline: 8px;
      }

      .heat-curve-chart {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 class="page-title">Heat Curve</h1>
    </header>

    <p id="loading" class="status" role="status" aria-live="polite">
      Loading Heat Curve data…
    </p>
    <p
      id="error"
      class="status status-error"
      role="alert"
      aria-live="assertive"
      hidden
    ></p>
    <main id="content" hidden></main>
  </div>

  <script type="text/javascript">
    const SVG_NAMESPACE = 'http://www.w3.org/2000/svg';
    const CHART_WIDTH = 640;
    const CHART_HEIGHT = 330;
    const CHART_PADDING = {
      top: 42,
      right: 34,
      bottom: 58,
      left: 62,
    };

    function createSvgElement(name, attributes = {}) {
      const element = document.createElementNS(SVG_NAMESPACE, name);

      Object.entries(attributes).forEach(([key, value]) => {
        element.setAttribute(key, String(value));
      });

      return element;
    }

    function formatTemperature(value) {
      return `${Number(value).toLocaleString(undefined, {
        maximumFractionDigits: 1,
      })}°C`;
    }

    function addText(svg, text, x, y, className, attributes = {}) {
      const element = createSvgElement('text', {
        x,
        y,
        class: className,
        ...attributes,
      });
      element.textContent = text;
      svg.appendChild(element);
      return element;
    }

    function createHeatCurveChart(curve) {
      const points = [
        {
          name: 'S1',
          outsideTemperature: curve.setpoint1.outsideTemperature,
          targetTemperature: curve.setpoint1.targetTemperature,
        },
        {
          name: 'S2',
          outsideTemperature: curve.setpoint2.outsideTemperature,
          targetTemperature: curve.setpoint2.targetTemperature,
        },
      ];

      const outsideValues = points.map(point => point.outsideTemperature);
      const targetValues = points.map(point => point.targetTemperature);
      const outsideMargin = Math.max(
        5,
        Math.abs(outsideValues[1] - outsideValues[0]) * 0.3
      );
      const targetMargin = Math.max(
        5,
        Math.abs(targetValues[1] - targetValues[0]) * 0.3
      );
      const xMin = Math.min(...outsideValues) - outsideMargin;
      const xMax = Math.max(...outsideValues) + outsideMargin;
      const yMin = Math.min(...targetValues) - targetMargin;
      const yMax = Math.max(...targetValues) + targetMargin;
      const plotWidth =
        CHART_WIDTH - CHART_PADDING.left - CHART_PADDING.right;
      const plotHeight =
        CHART_HEIGHT - CHART_PADDING.top - CHART_PADDING.bottom;

      console.log('Heat Curve SVG dimensions:', {
        width: CHART_WIDTH,
        height: CHART_HEIGHT,
        viewBox: `0 0 ${CHART_WIDTH} ${CHART_HEIGHT}`,
        plotWidth,
        plotHeight,
      });

      const scaleX = value =>
        CHART_PADDING.left + ((value - xMin) / (xMax - xMin)) * plotWidth;
      const scaleY = value =>
        CHART_PADDING.top + ((yMax - value) / (yMax - yMin)) * plotHeight;

      const svg = createSvgElement('svg', {
        class: 'heat-curve-chart',
        width: CHART_WIDTH,
        height: CHART_HEIGHT,
        viewBox: `0 0 ${CHART_WIDTH} ${CHART_HEIGHT}`,
        role: 'img',
        'aria-label': 'Heat curve based on the current setpoints',
      });

      for (let index = 0; index <= 4; index += 1) {
        const fraction = index / 4;
        const x = CHART_PADDING.left + fraction * plotWidth;
        const y = CHART_PADDING.top + fraction * plotHeight;
        const xValue = xMin + fraction * (xMax - xMin);
        const yValue = yMax - fraction * (yMax - yMin);

        svg.appendChild(
          createSvgElement('line', {
            x1: x,
            y1: CHART_PADDING.top,
            x2: x,
            y2: CHART_PADDING.top + plotHeight,
            class: 'chart-grid',
          })
        );
        svg.appendChild(
          createSvgElement('line', {
            x1: CHART_PADDING.left,
            y1: y,
            x2: CHART_PADDING.left + plotWidth,
            y2: y,
            class: 'chart-grid',
          })
        );

        addText(
          svg,
          `${Math.round(xValue)}°`,
          x,
          CHART_PADDING.top + plotHeight + 24,
          'chart-axis-label',
          { 'text-anchor': 'middle' }
        );
        addText(
          svg,
          `${Math.round(yValue)}°`,
          CHART_PADDING.left - 12,
          y + 4,
          'chart-axis-label',
          { 'text-anchor': 'end' }
        );
      }

      const plottedPoints = points
        .map(point => ({
          ...point,
          x: scaleX(point.outsideTemperature),
          y: scaleY(point.targetTemperature),
        }))
        .sort((first, second) => first.x - second.x);
      console.log(
        'Heat Curve setpoint coordinates:',
        plottedPoints.map(point => ({
          name: point.name,
          outsideTemperature: point.outsideTemperature,
          targetTemperature: point.targetTemperature,
          x: point.x,
          y: point.y,
        }))
      );
      const pointCoordinates = plottedPoints
        .map(point => `${point.x},${point.y}`)
        .join(' ');
      console.log('Heat Curve polyline points:', pointCoordinates);
      const areaCoordinates = [
        `${plottedPoints[0].x},${CHART_PADDING.top + plotHeight}`,
        pointCoordinates,
        `${plottedPoints[plottedPoints.length - 1].x},${CHART_PADDING.top + plotHeight}`,
      ].join(' ');

      svg.appendChild(
        createSvgElement('polygon', {
          points: areaCoordinates,
          class: 'chart-area',
        })
      );
      svg.appendChild(
        createSvgElement('polyline', {
          points: pointCoordinates,
          class: 'chart-line',
        })
      );

      plottedPoints.forEach(point => {
        svg.appendChild(
          createSvgElement('circle', {
            cx: point.x,
            cy: point.y,
            r: 8,
            class: 'chart-point-ring',
          })
        );
        addText(
          svg,
          `${point.name}  ${formatTemperature(point.targetTemperature)}`,
          point.x,
          point.y - 18,
          'chart-point-label',
          { 'text-anchor': 'middle' }
        );
      });

      addText(
        svg,
        'Outside temperature',
        CHART_PADDING.left + plotWidth / 2,
        CHART_HEIGHT - 8,
        'axis-title',
        { 'text-anchor': 'middle' }
      );
      const yAxisTitle = addText(
        svg,
        'Target temperature',
        15,
        CHART_PADDING.top + plotHeight / 2,
        'axis-title',
        { 'text-anchor': 'middle' }
      );
      yAxisTitle.setAttribute(
        'transform',
        `rotate(-90 15 ${CHART_PADDING.top + plotHeight / 2})`
      );

      return svg;
    }

    function createTemperatureRow(label, value) {
      const row = document.createElement('div');
      const labelElement = document.createElement('span');
      const valueElement = document.createElement('strong');

      row.className = 'temperature-row';
      labelElement.className = 'temperature-label';
      labelElement.textContent = label;
      valueElement.className = 'temperature-value';
      valueElement.textContent = formatTemperature(value);
      row.append(labelElement, valueElement);

      return row;
    }

    function createSetpointCard(title, setpoint) {
      const card = document.createElement('article');
      const heading = document.createElement('h3');

      card.className = 'setpoint-card';
      heading.className = 'setpoint-title';
      heading.textContent = title;
      card.appendChild(heading);
      card.appendChild(
        createTemperatureRow(
          'Outside temperature',
          setpoint.outsideTemperature
        )
      );
      card.appendChild(
        createTemperatureRow(
          'Target temperature',
          setpoint.targetTemperature
        )
      );

      return card;
    }

    function createSmartCorrectionCard(enabled) {
      const card = document.createElement('section');
      const text = document.createElement('div');
      const title = document.createElement('h3');
      const status = document.createElement('p');
      const toggle = document.createElement('span');

      card.className = 'smart-correction-card';
      title.className = 'smart-correction-title';
      title.textContent = 'Smart correction';
      status.className = 'smart-correction-status';
      status.textContent = enabled ? 'Enabled' : 'Disabled';
      text.append(title, status);

      toggle.className = 'readonly-toggle';
      toggle.setAttribute('role', 'switch');
      toggle.setAttribute('aria-checked', String(enabled));
      toggle.setAttribute('aria-disabled', 'true');
      toggle.setAttribute(
        'aria-label',
        `Smart correction ${enabled ? 'enabled' : 'disabled'}`
      );

      card.append(text, toggle);
      return card;
    }

    function renderHeatCurve(device) {
      const section = document.createElement('section');
      const deviceName = document.createElement('h2');
      const chartCard = document.createElement('section');
      const chartMeta = document.createElement('p');
      const setpointGrid = document.createElement('section');
      const curve = device.heatCurve;

      section.className = 'heat-curve-device';
      deviceName.className = 'device-name';
      deviceName.textContent = device.name;
      section.appendChild(deviceName);

      chartCard.className = 'chart-card';
      chartMeta.className = 'chart-meta';
      chartMeta.textContent = `Mode: ${curve.mode}  •  Heating kind: ${curve.heatingKind}`;
      const chart = createHeatCurveChart(curve);
      chartCard.append(chartMeta, chart);
      section.appendChild(chartCard);

      requestAnimationFrame(() => {
        const bounds = chart.getBoundingClientRect();
        console.log('Heat Curve SVG DOM state:', {
          isConnected: chart.isConnected,
          width: bounds.width,
          height: bounds.height,
          hidden: chart.hidden,
        });
      });

      setpointGrid.className = 'setpoint-grid';
      setpointGrid.append(
        createSetpointCard('Setpoint 1', curve.setpoint1),
        createSetpointCard('Setpoint 2', curve.setpoint2)
      );
      section.appendChild(setpointGrid);
      section.appendChild(createSmartCorrectionCard(curve.smartCorrection));

      return section;
    }

    function onHomeyReady(Homey) {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const content = document.getElementById('content');

      Homey.ready();

      Homey.api('GET', '/heat-curves', {}, (apiError, devices) => {
        loading.hidden = true;

        if (apiError || !Array.isArray(devices) || devices.length === 0) {
          error.textContent =
            'The Heat Curve could not be loaded. Please try again later.';
          error.hidden = false;
          return;
        }

        devices.forEach(device => {
          content.appendChild(renderHeatCurve(device));
        });
        content.hidden = false;
      });
    }
  </script>
</body>
</html>
